name: Publish Test Reports to GitHub Pages

on:
  workflow_run:
    workflows:
      - API CI
      - Web Playwright CI
      - Web Selenium CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    name: Aggregate and Publish Reports
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (empty)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare directories
        id: prep
        run: |
          set -euo pipefail
          DATE_UTC=$(date -u +"%F_%H-%M")
          echo "date_tag=${DATE_UTC}" >> "$GITHUB_OUTPUT"
          mkdir -p site

      - name: Download API smoke report
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: .github/workflows/web-api-tests.yml
          commit: ${{ github.event.workflow_run.head_sha || github.sha }}
          name: web-api-report-smoke
          if_no_artifact: ignore
          path: downloads/api/smoke

      - name: Download API regression report
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: .github/workflows/web-api-tests.yml
          commit: ${{ github.event.workflow_run.head_sha || github.sha }}
          name: web-api-report-regression
          if_no_artifact: ignore
          path: downloads/api/regression

      - name: Download Playwright smoke report
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: .github/workflows/web-playwright-tests.yml
          commit: ${{ github.event.workflow_run.head_sha || github.sha }}
          name: web-playwright-report-smoke
          if_no_artifact: ignore
          path: downloads/playwright/smoke

      - name: Download Playwright regression report
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: .github/workflows/web-playwright-tests.yml
          commit: ${{ github.event.workflow_run.head_sha || github.sha }}
          name: web-playwright-report-regression
          if_no_artifact: ignore
          path: downloads/playwright/regression

      - name: Download Selenium smoke report
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: .github/workflows/web-selenium-tests.yml
          commit: ${{ github.event.workflow_run.head_sha || github.sha }}
          name: web-selenium-report-smoke
          if_no_artifact: ignore
          path: downloads/selenium/smoke

      - name: Download Selenium regression report
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: .github/workflows/web-selenium-tests.yml
          commit: ${{ github.event.workflow_run.head_sha || github.sha }}
          name: web-selenium-report-regression
          if_no_artifact: ignore
          path: downloads/selenium/regression

      - name: Assemble site structure
        run: |
          set -euo pipefail
          DATE_TAG='${{ steps.prep.outputs.date_tag }}'
          mkdir -p "site/${DATE_TAG}/api/smoke" "site/${DATE_TAG}/api/regression"
          mkdir -p "site/${DATE_TAG}/playwright/smoke" "site/${DATE_TAG}/playwright/regression"
          mkdir -p "site/${DATE_TAG}/selenium/smoke" "site/${DATE_TAG}/selenium/regression"

          copy_or_fallback() {
            src_dir="$1"; dest_dir="$2"; title="$3";
            mkdir -p "$dest_dir"
            if [ -f "$src_dir/report.html" ]; then
              cp "$src_dir/report.html" "$dest_dir/index.html"
            else
              printf '%s\n' "<!doctype html>" \
                "<html><head><meta charset=\"utf-8\"><title>${title}</title></head>" \
                "<body><h1>${title}</h1><p>No report was produced for this run.</p></body></html>" \
                >"$dest_dir/index.html"
            fi
          }

          copy_or_fallback downloads/api/smoke      "site/${DATE_TAG}/api/smoke"               "API Smoke Report (${DATE_TAG})"
          copy_or_fallback downloads/api/regression "site/${DATE_TAG}/api/regression"          "API Regression Report (${DATE_TAG})"
          copy_or_fallback downloads/playwright/smoke      "site/${DATE_TAG}/playwright/smoke"  "Playwright Smoke Report (${DATE_TAG})"
          copy_or_fallback downloads/playwright/regression "site/${DATE_TAG}/playwright/regression" "Playwright Regression Report (${DATE_TAG})"
          copy_or_fallback downloads/selenium/smoke      "site/${DATE_TAG}/selenium/smoke"      "Selenium Smoke Report (${DATE_TAG})"
          copy_or_fallback downloads/selenium/regression "site/${DATE_TAG}/selenium/regression" "Selenium Regression Report (${DATE_TAG})"

          # latest redirects
          make_redirect() {
            dest_dir="$1"; target_rel="$2"; title="$3";
            mkdir -p "$dest_dir"
            printf '%s\n' "<!doctype html>" \
              "<html><head><meta charset=\"utf-8\"><meta http-equiv=\"refresh\" content=\"0; url=${target_rel}\"><title>${title}</title></head>" \
              "<body><a href=\"${target_rel}\">Go to latest</a></body></html>" \
              >"$dest_dir/index.html"
          }

          make_redirect site/api/latest/smoke        "../../${DATE_TAG}/api/smoke/"                 "API Smoke (latest)"
          make_redirect site/api/latest/regression   "../../${DATE_TAG}/api/regression/"            "API Regression (latest)"
          make_redirect site/playwright/latest/smoke      "../../${DATE_TAG}/playwright/smoke/"     "Playwright Smoke (latest)"
          make_redirect site/playwright/latest/regression "../../${DATE_TAG}/playwright/regression/" "Playwright Regression (latest)"
          make_redirect site/selenium/latest/smoke      "../../${DATE_TAG}/selenium/smoke/"         "Selenium Smoke (latest)"
          make_redirect site/selenium/latest/regression "../../${DATE_TAG}/selenium/regression/"     "Selenium Regression (latest)"

          # root landing page
          printf '%s\n' \
            "<!doctype html>" \
            "<html><head><meta charset=\"utf-8\"><title>Test Reports</title></head>" \
            "<body>" \
            "  <h1>Test Reports</h1>" \
            "  <h2>Latest</h2>" \
            "  <ul>" \
            "    <li><a href=\"api/latest/smoke/\">API / Smoke</a></li>" \
            "    <li><a href=\"api/latest/regression/\">API / Regression</a></li>" \
            "    <li><a href=\"playwright/latest/smoke/\">Playwright / Smoke</a></li>" \
            "    <li><a href=\"playwright/latest/regression/\">Playwright / Regression</a></li>" \
            "    <li><a href=\"selenium/latest/smoke/\">Selenium / Smoke</a></li>" \
            "    <li><a href=\"selenium/latest/regression/\">Selenium / Regression</a></li>" \
            "  </ul>" \
            "  <h2>Current Run</h2>" \
            "  <p>Date tag: ${DATE_TAG}</p>" \
            "  <ul>" \
            "    <li><a href=\"${DATE_TAG}/api/smoke/\">${DATE_TAG} / API / Smoke</a></li>" \
            "    <li><a href=\"${DATE_TAG}/api/regression/\">${DATE_TAG} / API / Regression</a></li>" \
            "    <li><a href=\"${DATE_TAG}/playwright/smoke/\">${DATE_TAG} / Playwright / Smoke</a></li>" \
            "    <li><a href=\"${DATE_TAG}/playwright/regression/\">${DATE_TAG} / Playwright / Regression</a></li>" \
            "    <li><a href=\"${DATE_TAG}/selenium/smoke/\">${DATE_TAG} / Selenium / Smoke</a></li>" \
            "    <li><a href=\"${DATE_TAG}/selenium/regression/\">${DATE_TAG} / Selenium / Regression</a></li>" \
            "  </ul>" \
            "</body></html>" \
            > site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
