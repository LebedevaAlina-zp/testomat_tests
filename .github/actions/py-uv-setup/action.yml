name: py-uv-setup
description: Set up Python + uv with caching; optional Playwright (Chromium) or Chrome install

inputs:
  python-version:
    description: Python version to install
    default: '3.14'
  dev-deps:
    description: Install dev dependencies (uv sync --dev --frozen); otherwise tests only (uv sync --frozen)
    default: 'false'
  install-playwright:
    description: Install Playwright Chromium and restore its cache
    default: 'false'
  install-chrome:
    description: Install Google Chrome (for Selenium tests)
    default: 'false'

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v4

    - name: Restore uv cache (.venv and uv downloads)
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}

    - name: Restore Playwright cache (Chromium)
      if: ${{ inputs.install-playwright == 'true' }}
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: pw-${{ runner.os }}-chromium

    - name: Restore Selenium Manager cache (drivers)
      if: ${{ inputs.install-chrome == 'true' }}
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/selenium
        key: selenium-${{ runner.os }}

    - name: Sync dependencies (dev)
      if: ${{ inputs.dev-deps == 'true' }}
      shell: bash
      run: uv sync --dev --frozen

    - name: Sync dependencies (tests only)
      if: ${{ inputs.dev-deps != 'true' }}
      shell: bash
      run: uv sync --frozen

    - name: Install Playwright dependencies and Chromium
      if: ${{ inputs.install-playwright == 'true' }}
      shell: bash
      run: uv run playwright install --with-deps chromium

    - name: Install Chrome (for Selenium)
      if: ${{ inputs.install-chrome == 'true' }}
      uses: browser-actions/setup-chrome@v1
